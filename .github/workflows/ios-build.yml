name: iOS Build (no Mac needed)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --non-interactive

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Build iOS app (unsigned)
        run: |
          cd ios
          xcodebuild \
            -workspace *.xcworkspace \
            -scheme * \
            -configuration Release \
            -archivePath build/app.xcarchive \
            archive CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd ios
          mkdir -p build/ipa
          cp -r build/app.xcarchive/Products/Applications/*.app build/ipa/
          cd build/ipa
          zip -r app.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/build/ipa/app.ipa
